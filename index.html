<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAsUHhlyGQp0rNM9qchGtPeceBQEhRV3pM",
            authDomain: "garage69-3574a.firebaseapp.com",
            projectId: "garage69-3574a",
            storageBucket: "garage69-3574a.firebasestorage.app",
            messagingSenderId: "13019536433",
            appId: "1:13019536433:web:e11f310ae679dc3c0f0910"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ADMIN_PIN = "1969";
        const LOGO_URL = "https://firebasestorage.googleapis.com/v0/b/garage69-3574a.firebasestorage.app/o/1774196968981_2-removebg-preview.png?alt=media&token=0bd96410-ca5e-4517-9bc6-de624b30d6df";

        const Icons = {
            Home: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Plan: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Talk: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            Bar: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 11h1a3 3 0 0 1 0 6h-1"/><path d="M9 12v6"/><path d="M13 12v6"/><path d="M14 7.5c-1 0-1.44.5-3 .5s-2-.5-3-.5-1.72.5-2.5.5a.5.5 0 0 1-.5-.5V5c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v2a.5.5 0 0 1-.5.5c-.78 0-1.5-.5-2.5-.5Z"/><path d="M5 8v11a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8"/></svg>,
            Rank: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            Admin: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Bell: ({ active }) => (
                <svg className={`w-6 h-6 transition-all ${active ? 'text-[#C23B22] fill-[#C23B22]/10' : 'text-slate-300'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
                </svg>
            ),
            Trash: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Send: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        };

        function App() {
            const version = "Alpha 3.9.2";
            const [activeView, setActiveView] = useState('home');
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [currentUser, setCurrentUser] = useState(localStorage.getItem('g69_user') || "");
            const [notifsEnabled, setNotifsEnabled] = useState(localStorage.getItem('g69_notifs') === 'true');
            const [isOnline, setIsOnline] = useState(false);
            const [players, setPlayers] = useState([]);
            const [sessions, setSessions] = useState([]);
            const [messages, setMessages] = useState([]);
            const [beerStock, setBeerStock] = useState([]);
            const [news, setNews] = useState([]);

            useEffect(() => {
                const unsubPlayers = db.collection('members').orderBy('name', 'asc').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPlayers(data);
                    const savedUser = localStorage.getItem('g69_user');
                    if (savedUser) {
                        const me = data.find(p => p.name === savedUser);
                        if (me && me.isBound === false) { setCurrentUser(""); localStorage.removeItem('g69_user'); }
                    }
                    setIsOnline(true); setIsLoading(false);
                }, err => { setIsOnline(false); setIsLoading(false); });

                const unsubBeer = db.collection('beer').onSnapshot(snap => setBeerStock(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubSessions = db.collection('sessions').orderBy('date', 'asc').onSnapshot(snap => setSessions(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubChat = db.collection('chat').orderBy('timestamp', 'asc').limit(50).onSnapshot(snap => setMessages(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubNews = db.collection('news').orderBy('date', 'desc').limit(5).onSnapshot(snap => setNews(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));

                return () => { unsubPlayers(); unsubBeer(); unsubSessions(); unsubChat(); unsubNews(); };
            }, []);

            const vibrate = () => { if (window.navigator.vibrate) window.navigator.vibrate(20); };
            const handleAdminLogin = () => { vibrate(); const pin = prompt("Admin PIN:"); if(pin === ADMIN_PIN) { setIsAdmin(true); setActiveView('admin'); } };

            const Dashboard = () => {
                const selectIdentity = async (name, id) => { vibrate(); setCurrentUser(name); localStorage.setItem('g69_user', name); await db.collection('members').doc(id).update({ isBound: true }); };
                return (
                    <div className="space-y-6 animate-fadeIn text-center max-w-xl mx-auto flex flex-col items-center">
                        <div className="flex flex-col items-center py-6 w-full">
                            <div className="w-72 h-72 md:w-96 md:h-96 mb-2"><img src={LOGO_URL} className="w-full h-full object-contain drop-shadow-2xl" alt="Garage69" /></div>
                            <div className="mt-2 p-5 darts-card rounded-2xl w-full max-w-[300px] border-l-0 border-t-4 border-t-[#C23B22]">
                                {!currentUser ? (
                                    <div className="animate-fadeIn">
                                        <p className="text-xs font-black uppercase mb-3 text-slate-400 tracking-widest text-center">Identität wählen</p>
                                        <select onChange={(e) => { const p = players.find(x => x.name === e.target.value); if(p) selectIdentity(p.name, p.id); }} className="bg-slate-50 border border-slate-200 p-3 rounded-xl text-base w-full font-bold outline-none text-center cursor-pointer">
                                            <option value="">Profil...</option>
                                            {players.filter(p => !p.isBound).map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                        </select>
                                    </div>
                                ) : (
                                    <div className="py-2 animate-fadeIn">
                                        <p className="text-xs font-black uppercase text-[#C23B22] mb-1 tracking-[0.2em]">Hallo</p>
                                        <p className="text-3xl font-black text-[#1F293A] uppercase tracking-tighter">{currentUser}</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* News Sektion */}
                        <div className="mt-4 w-full max-w-md text-left px-2">
                            <h3 className="text-xs font-black uppercase text-[#C23B22] mb-3 tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 bg-[#C23B22] rounded-full animate-pulse"></span>
                                News vom Board
                            </h3>
                            <div className="space-y-3">
                                {news.length === 0 ? (
                                    <p className="text-slate-400 italic text-sm text-center py-4">Noch keine Neuigkeiten...</p>
                                ) : (
                                    news.map(n => (
                                        <div key={n.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-[#1F293A] animate-fadeIn">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">{new Date(n.date).toLocaleDateString('de-DE')}</p>
                                            <p className="font-bold text-slate-800 text-sm leading-relaxed">{n.content}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminView = () => {
                const [newPlayerName, setNewPlayerName] = useState("");
                const [newS, setNewS] = useState({ id: null, title: '', date: '', time: '' });
                const [newsText, setNewsText] = useState("");
                const [newsDate, setNewsDate] = useState(new Date().toISOString().split('T')[0]);
                const [activeIdx, setActiveIdx] = useState(0);

                const handleScroll = (e) => { const idx = Math.round(e.target.scrollLeft / e.target.offsetWidth); setActiveIdx(idx); };
                const addPlayer = async () => { if(newPlayerName.trim()) { await db.collection('members').add({ name: newPlayerName.trim(), isBound: false }); setNewPlayerName(""); } };
                const resetPlayer = async (id) => { vibrate(); await db.collection('members').doc(id).update({ isBound: false }); };
                const deletePlayer = async (id) => { if(confirm("Löschen?")) { vibrate(); await db.collection('members').doc(id).delete(); } };
                const deleteSession = async (id) => { if(confirm("Termin permanent entfernen?")) { vibrate(); await db.collection('sessions').doc(id).delete(); if(newS.id === id) setNewS({id:null, title:'', date:'', time:''}); } };
                
                const addNews = async () => {
                    if(!newsText.trim()) return;
                    await db.collection('news').add({ content: newsText.trim(), date: newsDate });
                    setNewsText("");
                    alert("News gepostet!");
                };

                const deleteNews = async (id) => { if(confirm("News löschen?")) await db.collection('news').doc(id).delete(); };

                const saveSession = async () => { 
                    if(!newS.title) return;
                    if(newS.id) {
                        await db.collection('sessions').doc(newS.id).update({ title: newS.title, date: newS.date, time: newS.time });
                        alert("Aktualisiert!");
                    } else {
                        await db.collection('sessions').add({...newS, responses: {}});
                        alert("Erstellt!");
                    }
                    setNewS({id:null, title:'', date:'', time:''});
                };

                const editSession = (s) => { vibrate(); setNewS({ id: s.id, title: s.title, date: s.date, time: s.time }); };

                return (
                    <div className="space-y-6 animate-fadeIn">
                        <div className="flex justify-between items-center px-2">
                            <h2 className="text-2xl font-black italic uppercase text-[#1F293A]">Admin HQ</h2>
                            <button onClick={() => { setIsAdmin(false); setActiveView('home'); }} className="text-xs bg-slate-200 px-4 py-2 rounded-full font-bold">Logout</button>
                        </div>

                        <div onScroll={handleScroll} className="flex overflow-x-auto snap-x snap-mandatory no-scrollbar gap-4 pb-4 px-1">
                            {/* Termin-Verwaltung */}
                            <div className="snap-center min-w-full md:min-w-[50%] lg:min-w-[40%]">
                                <div className="darts-card p-6 rounded-[2.5rem] shadow-xl min-h-[520px] flex flex-col relative border-amber-400 border border-4 border-amber-100">
                                    <p className="text-[#C23B22] font-black uppercase italic mb-4 text-center text-xl tracking-tighter">Termine</p>
                                    <div className="space-y-3 mb-6 border-b border-slate-100 pb-4 bg-slate-50/50 p-3 rounded-2xl relative">
                                        {newS.id && <span className="absolute top-2 right-2 text-[10px] bg-amber-400 text-amber-900 px-2 py-0.5 rounded-full font-black uppercase">Edit</span>}
                                        <input value={newS.title} onChange={e => setNewS({...newS, title: e.target.value})} placeholder="Event Name" className="w-full p-3 border rounded-lg text-base bg-white outline-none font-bold"/>
                                        <div className="flex gap-2">
                                            <input type="date" value={newS.date} onChange={e => setNewS({...newS, date: e.target.value})} className="flex-1 p-3 border rounded-lg text-sm bg-white outline-none"/>
                                            <input type="time" value={newS.time} onChange={e => setNewS({...newS, time: e.target.value})} className="flex-1 p-3 border rounded-lg text-sm bg-white outline-none"/>
                                        </div>
                                        <button onClick={saveSession} className={`w-full text-white py-3 rounded-lg font-black uppercase text-xs ${newS.id ? 'bg-amber-500' : 'bg-[#C23B22]'}`}>
                                            {newS.id ? 'Speichern' : 'Publizieren'}
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 max-h-48">
                                        {sessions.map(s => (
                                            <div key={s.id} onClick={() => editSession(s)} className="flex justify-between items-center p-3 rounded-xl border bg-white border-slate-100">
                                                <div className="truncate pr-2"><p className="font-black text-xs uppercase leading-tight">{s.title}</p></div>
                                                <button onClick={(e) => { e.stopPropagation(); deleteSession(s.id); }} className="text-red-500 p-2"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* News Management */}
                            <div className="snap-center min-w-full md:min-w-[50%] lg:min-w-[40%]">
                                <div className="darts-card p-6 rounded-[2.5rem] shadow-xl min-h-[520px] flex flex-col border-emerald-400 border border-4 border-emerald-100">
                                    <p className="text-emerald-600 font-black uppercase italic mb-4 text-center text-xl tracking-tighter">News Board</p>
                                    <div className="space-y-3 mb-6 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                        <textarea value={newsText} onChange={e => setNewsText(e.target.value)} placeholder="Was gibt's Neues?" className="w-full p-3 border rounded-lg text-sm bg-white outline-none h-24 resize-none"></textarea>
                                        <input type="date" value={newsDate} onChange={e => setNewsDate(e.target.value)} className="w-full p-3 border rounded-lg text-sm bg-white outline-none"/>
                                        <button onClick={addNews} className="w-full bg-emerald-600 text-white py-3 rounded-lg font-black uppercase text-xs">Posten</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 max-h-48">
                                        {news.map(n => (
                                            <div key={n.id} className="p-3 rounded-xl border bg-white border-slate-100 space-y-1">
                                                <p className="text-[9px] text-slate-400 font-bold">{new Date(n.date).toLocaleDateString()}</p>
                                                <p className="text-xs font-medium text-slate-700 leading-snug line-clamp-2">{n.content}</p>
                                                <button onClick={() => deleteNews(n.id)} className="text-red-500 text-[10px] font-bold">Löschen</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Member-Verwaltung */}
                            <div className="snap-center min-w-full md:min-w-[50%] lg:min-w-[40%]">
                                <div className="darts-card p-6 rounded-[2.5rem] shadow-xl min-h-[520px] flex flex-col border-sky-400 border border-4 border-sky-100">
                                    <p className="text-sky-600 font-black uppercase italic mb-4 text-center text-xl tracking-tighter">Members</p>
                                    <div className="flex gap-2 mb-6 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                        <input value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} placeholder="Neuer Name" className="flex-1 p-3 border rounded-lg text-base bg-white outline-none font-bold"/>
                                        <button onClick={addPlayer} className="bg-sky-600 text-white px-5 rounded-lg font-black uppercase text-xs">Add</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 max-h-72">
                                        {players.map(p => (
                                            <div key={p.id} className="flex justify-between items-center p-3 rounded-xl border bg-white border-slate-100">
                                                <div className="flex items-center gap-2">
                                                    <span className={`w-2 h-2 rounded-full ${p.isBound ? 'bg-emerald-500' : 'bg-slate-300'}`}></span>
                                                    <p className="font-bold text-sm">{p.name}</p>
                                                </div>
                                                <div className="flex gap-1">
                                                    {p.isBound && <button onClick={() => resetPlayer(p.id)} className="text-amber-600 bg-amber-50 p-2 rounded-lg text-[10px] font-bold">Reset</button>}
                                                    <button onClick={() => deletePlayer(p.id)} className="text-red-500 p-2"><Icons.Trash /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        {/* Pagination Dots */}
                        <div className="flex justify-center gap-2 mt-[-10px]">
                            {[0,1,2].map(i => <div key={i} className={`w-2 h-2 rounded-full transition-all ${activeIdx === i ? 'bg-[#C23B22] w-4' : 'bg-slate-300'}`}></div>)}
                        </div>
                    </div>
                );
            };

            const PlanView = () => {
                const updateResponse = async (sessionId, status) => { if (!currentUser) { alert("Wer bist du? Bitte auf Home-Screen Profil wählen."); return; } vibrate(); const s = sessions.find(x => x.id === sessionId); const resp = s.responses || {}; resp[currentUser] = status; await db.collection('sessions').doc(sessionId).update({ responses: resp }); };
                const getRespCount = (s, status) => Object.values(s.responses || {}).filter(v => v === status).length;
                const getMyResp = (s) => (s.responses || {})[currentUser] || null;

                const sortedSessions = sessions
                    .filter(s => new Date(s.date) >= new Date().setHours(0,0,0,0))
                    .sort((a,b) => new Date(a.date) - new Date(b.date));

                return (
                    <div className="space-y-5 animate-fadeIn px-1">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-black italic uppercase text-[#1F293A]">Dates</h2>
                            <p className="text-xs font-bold text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-100">{sortedSessions.length} kommende Events</p>
                        </div>
                        {sortedSessions.map((s, idx) => {
                            const dateObj = new Date(s.date);
                            const isToday = dateObj.toDateString() === new Date().toDateString();
                            const myResp = getMyResp(s);
                            
                            return (
                                <div key={s.id} className={`darts-card p-5 rounded-[2rem] relative ${idx === 0 ? 'border-l-[6px] shadow-lg' : ''}`}>
                                    {isToday && <span className="absolute -top-2 -right-2 bg-emerald-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-wider shadow-md">Heute</span>}
                                    <div className="flex justify-between items-start gap-4 mb-4">
                                        <div className="flex-1">
                                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">{dateObj.toLocaleDateString('de-DE', { weekday: 'long' })}</p>
                                            <p className="text-2xl font-black text-[#1F293A] tracking-tighter leading-tight">{dateObj.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })} <span className="text-lg text-slate-400 font-bold">/ {s.time} Uhr</span></p>
                                            <p className="font-bold text-sm text-slate-600 mt-1 uppercase tracking-wide">{s.title}</p>
                                        </div>
                                        <div className="text-right flex flex-col gap-1 items-end min-w-[70px]">
                                            <div className="flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full"><span className="font-black text-lg">{getRespCount(s, 'yes')}</span> <span className="text-xs font-bold uppercase">Dabei</span></div>
                                            <div className="flex items-center gap-1.5 text-red-600 bg-red-50 px-3 py-1 rounded-full"><span className="font-black text-lg">{getRespCount(s, 'no')}</span> <span className="text-xs font-bold uppercase">Raus</span></div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 pt-4 border-t border-slate-100">
                                        <button onClick={() => updateResponse(s.id, 'yes')} className={`flex items-center justify-center gap-2 p-3.5 rounded-xl font-black uppercase text-xs transition-all ${myResp === 'yes' ? 'bg-emerald-600 text-white shadow-inner' : 'bg-slate-100 text-slate-600'}`}>
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                                            Zusage
                                        </button>
                                        <button onClick={() => updateResponse(s.id, 'no')} className={`flex items-center justify-center gap-2 p-3.5 rounded-xl font-black uppercase text-xs transition-all ${myResp === 'no' ? 'bg-red-600 text-white shadow-inner' : 'bg-slate-100 text-slate-600'}`}>
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            Absage
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                        {sortedSessions.length === 0 && <div className="text-center py-12 text-slate-400 font-medium italic darts-card rounded-2xl bg-slate-50 border-dashed">Keine Termine geplant...</div>}
                    </div>
                );
            };

            const TalkView = () => {
                const [newMsg, setNewMsg] = useState("");
                const bottomRef = useRef(null);
                useEffect(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), [messages]);

                const sendMsg = async () => { if(!currentUser || !newMsg.trim()) return; await db.collection('chat').add({ user: currentUser, text: newMsg.trim(), timestamp: firebase.firestore.FieldValue.serverTimestamp() }); setNewMsg(""); vibrate(); };

                return (
                    <div className="h-[calc(100vh-160px)] flex flex-col animate-fadeIn">
                        <div className="flex justify-between items-center mb-4 px-1">
                            <h2 className="text-2xl font-black italic uppercase text-[#1F293A]">Garage Talk</h2>
                            <div className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${isOnline ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
                                <span className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500' : 'bg-red-500'} ${isOnline ? 'animate-pulse' : ''}`}></span>
                                {isOnline ? 'Live' : 'Offline'}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 space-y-4 no-scrollbar pb-4">
                            {messages.map((m, idx) => {
                                const isMe = m.user === currentUser;
                                const showUser = idx === 0 || messages[idx-1].user !== m.user;
                                const time = m.timestamp ? m.timestamp.toDate().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'}) : "...";
                                
                                return (
                                    <div key={m.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'} animate-fadeIn`}>
                                        <div className={`max-w-[85%] ${isMe ? 'items-end' : 'items-start'} flex flex-col`}>
                                            {!isMe && showUser && <p className="text-[11px] font-black text-slate-500 ml-3 mb-1 uppercase tracking-wide">{m.user}</p>}
                                            <div className={`px-4 py-2.5 rounded-2xl shadow-sm text-sm font-medium relative ${isMe ? 'bg-[#C23B22] text-white msg-tail-right' : 'bg-white text-slate-800 border msg-tail-left'}`}>
                                                <p className="leading-relaxed">{m.text}</p>
                                                <span className={`text-[9px] font-bold mt-1 block ${isMe ? 'text-red-100/80 text-right' : 'text-slate-400'}`}>{time}</span>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={bottomRef}></div>
                        </div>
                        <div className="p-2 bg-white rounded-full shadow-lg border border-slate-100 flex gap-2 items-center sticky bottom-0 mt-2">
                            <input value={newMsg} onChange={e => setNewMsg(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMsg()} placeholder={currentUser ? "Nachricht..." : "Profil wählen zum Chatten"} disabled={!currentUser} className="flex-1 bg-transparent p-3 pl-4 outline-none text-sm font-medium disabled:opacity-50"/>
                            <button onClick={sendMsg} disabled={!currentUser || !newMsg.trim()} className="bg-[#C23B22] text-white p-3 rounded-full disabled:bg-slate-300 transition-all aspect-square flex items-center justify-center">
                                <Icons.Send />
                            </button>
                        </div>
                    </div>
                );
            };

            const BarView = () => (
                <div className="space-y-6 animate-fadeIn">
                    <div className="flex justify-between items-center px-1">
                        <h2 className="text-2xl font-black italic uppercase text-[#1F293A]">Bier Vorrat</h2>
                        <Icons.Bar />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {beerStock.map(b => {
                            const stockLimit = b.min || 5;
                            const lowStock = b.stock <= stockLimit;
                            return (
                                <div key={b.id} className={`darts-card p-5 rounded-2xl ${lowStock ? 'border-l-amber-500 bg-amber-50' : ''}`}>
                                    <p className="font-black text-lg text-[#1F293A] tracking-tight truncate">{b.name}</p>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">{b.type || 'Kaltgetränk'}</p>
                                    <div className="flex items-end justify-between gap-2 border-t border-slate-100 pt-3">
                                        <p className={`font-black text-5xl tracking-tighter ${lowStock ? 'text-amber-600' : 'text-[#C23B22]'}`}>{b.stock}</p>
                                        <span className={`text-xs font-black uppercase px-2 py-1 rounded-md ${lowStock ? 'bg-amber-100 text-amber-800 animate-pulse' : 'bg-slate-100 text-slate-600'}`}>Flaschen</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {beerStock.length === 0 && <div className="text-center py-10 darts-card rounded-2xl bg-slate-50 italic text-slate-400 text-sm border-dashed">Keine Daten verfügbar...</div>}
                </div>
            );

            const RankView = () => {
                const dummyRanks = [
                    { name: 'Kev', points: 1250, av: 45.5, win: 12, icons: '🏆🔥' },
                    { name: 'Dome', points: 1100, av: 42.1, win: 10, icons: '🎯' },
                    { name: 'Malle', points: 950, av: 39.8, win: 8, icons: '' },
                    { name: 'Meff', points: 800, av: 35.2, win: 5, icons: '🐢' }
                ];

                return (
                    <div className="space-y-5 animate-fadeIn">
                        <div className="flex justify-between items-center px-1">
                            <h2 className="text-2xl font-black italic uppercase text-[#1F293A]">Darts Order of Merit</h2>
                            <span className="text-4xl">🎯</span>
                        </div>
                        
                        <div className="space-y-3">
                            {dummyRanks.map((r, idx) => (
                                <div key={r.name} className={`bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 relative shadow-sm ${idx === 0 ? 'border-l-4 border-l-amber-400' : idx === 1 ? 'border-l-4 border-l-slate-400' : idx === 2 ? 'border-l-4 border-l-orange-400' : ''}`}>
                                    <div className={`font-black text-2xl w-10 text-center ${idx < 3 ? 'text-[#1F293A]' : 'text-slate-300'}`}>#{idx + 1}</div>
                                    <div className="flex-1">
                                        <p className="font-black text-base text-[#1F293A] flex items-center gap-2">{r.name} <span className="text-sm">{r.icons}</span></p>
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{r.points} Pkt. / Avg. {r.av}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-black text-[#C23B22]">{r.win}</p>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">Siege</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="darts-card p-5 rounded-2xl bg-[#1F293A] text-white border-none mt-6">
                            <p className="font-bold text-xs uppercase text-amber-400 mb-1 tracking-widest">Letztes Turnier</p>
                            <p className="font-black text-xl tracking-tight">Garage Masters 2023</p>
                            <p className="text-sm mt-1 text-slate-300">Sieger: <span className="font-bold text-white">Kev</span> (Def. Dome 5:3)</p>
                        </div>
                    </div>
                );
            };

            const NavItem = ({ view, icon, label }) => {
                const active = activeView === view;
                const Icon = Icons[icon];
                return (
                    <button onClick={() => { vibrate(); setActiveView(view); }} className={`flex flex-col items-center justify-center w-full h-full transition-all relative ${active ? 'text-[#C23B22]' : 'text-slate-400'}`}>
                        {active && <span className="absolute -top-px left-1/2 -translate-x-1/2 w-8 h-1 bg-[#C23B22] rounded-b-full shadow-[0_2px_10px_rgba(194,59,34,0.5)]"></span>}
                        <div className={`transition-transform ${active ? 'scale-110' : ''}`}><Icon /></div>
                        <span className={`text-[10px] mt-1 font-black uppercase tracking-widest transition-opacity ${active ? 'opacity-100' : 'opacity-70'}`}>{label}</span>
                    </button>
                );
            };

            if (isLoading) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-[#F1F5F9] gap-4">
                    <div className="loader"></div>
                    <p className="font-black text-xs uppercase tracking-[0.3em] text-[#1F293A] animate-pulse">Garage69</p>
                </div>
            );

            return (
                <div className="flex flex-col h-screen pb-[80px]">
                    <header className="sticky top-0 z-50 bg-[#F1F5F9] px-4 pt-3 pb-3 border-b border-slate-200/50 flex justify-between items-center" style={{paddingTop: 'calc(0.75rem + env(safe-area-inset-top))'}}>
                        <div className="flex items-center gap-1" onClick={handleAdminLogin}>
                            <span className="p-2 mr-1 text-2xl font-black text-black bg-white rounded-full shadow-inner border border-slate-200">G</span>
                            <span className="text-2xl font-bold text-red-600">69</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-100">{version}</span>
                            <button onClick={() => { vibrate(); const n = !notifsEnabled; setNotifsEnabled(n); localStorage.setItem('g69_notifs', n); alert(n ? "Push-Notifikationen aktiviert (Simulation)" : "Notifikationen deaktiviert"); }} className="p-2.5 rounded-full bg-white border border-slate-100 shadow-sm">
                                <Icons.Bell active={notifsEnabled} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 md:p-6 no-scrollbar">
                        <div className="max-w-7xl mx-auto">
                            {activeView === 'home' && <Dashboard />}
                            {activeView === 'plan' && <PlanView />}
                            {activeView === 'talk' && <TalkView />}
                            {activeView === 'bar' && <BarView />}
                            {activeView === 'rank' && <RankView />}
                            {activeView === 'admin' && isAdmin && <AdminView />}
                        </div>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-[75px] shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50 rounded-t-3xl" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}>
                        <div className="grid grid-cols-5 h-full max-w-lg mx-auto px-2">
                            <NavItem view="home" icon="Home" label="Home" />
                            <NavItem view="plan" icon="Plan" label="Plan" />
                            <NavItem view="talk" icon="Talk" label="Talk" />
                            <NavItem view="bar" icon="Bar" label="Bar" />
                            <NavItem view="rank" icon="Rank" label="Rank" />
                        </div>
                    </nav>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
